<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="Main">

    <f:if condition="{files}">
        <ul class="filelink-list">
            <f:for each="{files}" as="file" iteration="fileIterator">
                <f:variable name="fileTitle">
                    <f:if condition="{file.properties.title}">
                        <f:then>
                            {file.properties.title} ({f:format.case(value: file.properties.extension, mode: 'lower')})
                        </f:then>
                        <f:else>
                            {file.properties.name}
                        </f:else>
                    </f:if>
                </f:variable>
                <f:variable name="fileTitle">{fileTitle -> f:format.trim()}</f:variable>
                <li class="filelink-item">
                    <f:if condition="{data.uploads_type} == 1">
                        <div class="filelink-media">
                            <span class="filelink-fileicon" aria-hidden="true">
                                <f:switch expression="{f:format.case(value: file.properties.extension, mode: 'lower')}">
                                    <f:case value="mp3"><span class="nbbasetemplateicon nbbasetemplateicon-file-audio"></span></f:case>
                                    <f:case value="avi"><span class="nbbasetemplateicon nbbasetemplateicon-file-video"></span></f:case>
                                    <f:case value="mov"><span class="nbbasetemplateicon nbbasetemplateicon-file-video"></span></f:case>
                                    <f:case value="mpg"><span class="nbbasetemplateicon nbbasetemplateicon-file-video"></span></f:case>
                                    <f:case value="mpeg"><span class="nbbasetemplateicon nbbasetemplateicon-file-video"></span></f:case>
                                    <f:case value="mkv"><span class="nbbasetemplateicon nbbasetemplateicon-file-video"></span></f:case>
                                    <f:case value="jpg"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="gif"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="png"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="bmp"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="ai"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="eps"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="ico"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="tga"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="tif"><span class="nbbasetemplateicon nbbasetemplateicon-file-image"></span></f:case>
                                    <f:case value="youtube"><span class="nbbasetemplateicon nbbasetemplateicon-youtube"></span></f:case>
                                    <f:defaultCase><span class="nbbasetemplateicon nbbasetemplateicon-file"></span></f:defaultCase>
                                </f:switch>
                            </span>
                        </div>
                    </f:if>
                    <f:if condition="{data.uploads_type} == 2">
                        <f:if condition="{file -> nb:file.isImage()} || {file -> nb:file.isMedia()}">
                            <f:if condition="{f:uri.image(src: 'file:{f:if(condition: file.originalFile, then: \'file:{file.originalFile.uid}\', else: \'file:{file.uid}\')}')} != '/'">
                                <div class="filelink-media">
                                    <a href="{file.publicUrl}" title="{fileTitle}"{f:if(condition: data.target, then: ' target="{data.target}"')}>
                                        <f:media
                                            file="{file}"
                                            title="{fileTitle}"
                                            width="{settings.uploads.preview.width}"
                                            height="{settings.uploads.preview.height}"
                                            alt="{file.properties.alternative}"
                                        />
                                    </a>
                                </div>
                            </f:if>
                        </f:if>
                    </f:if>
                    <div class="filelink-body">
                        <div class="filelink-heading">
                            <span class="filelink-filename">
                                <a href="{file.publicUrl}" title="{fileTitle}"{f:if(condition: data.target, then: ' target="{data.target}"')}>
                                    {fileTitle}
                                </a>
                            </span>
                            <f:if condition="{data.filelink_size}">
                                <span class="filelink-filesize"><f:format.bytes value="{file.properties.size}" /></span>
                            </f:if>
                        </div>
                        <f:if condition="{data.uploads_description}">
                            <f:if condition="{file.properties.description}">
                                <p class="filelink-filedescription">{file.properties.description}</p>
                            </f:if>
                        </f:if>
                    </div>
                </li>
            </f:for>
        </ul>
    </f:if>

</f:section>
</html>
